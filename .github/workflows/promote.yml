name: Promote between environments

on:
  pull_request:
    types: [closed]
    branches: [dev, staging]

jobs:
  promote:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Determine target branch
        id: target
        run: |
          if [ "${{ github.event.pull_request.base.ref }}" = "dev" ]; then
            echo "branch=staging" >> $GITHUB_OUTPUT
            echo "title=Promote dev → staging" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.pull_request.base.ref }}" = "staging" ]; then
            echo "branch=main" >> $GITHUB_OUTPUT
            echo "title=Promote staging → main" >> $GITHUB_OUTPUT
          fi

      - name: Create promotion PR
        if: steps.target.outputs.branch != ''
        uses: repo-sync/pull-request@v2
        with:
          source_branch: ${{ github.event.pull_request.base.ref }}
          destination_branch: ${{ steps.target.outputs.branch }}
          pr_title: ${{ steps.target.outputs.title }}
          pr_body: |
            Auto-promotion from `${{ github.event.pull_request.base.ref }}` to `${{ steps.target.outputs.branch }}`

            Triggered by PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
